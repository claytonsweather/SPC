<!DOCTYPE html>
<html>
<head>
  <title>CW Storm Center</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin:0; font-family:-apple-system; background:#0b1e3c; }
    #map { height:100vh; }

    .topbar {
      position:absolute; top:10px; left:50%;
      transform:translateX(-50%);
      background:#0d3c8f; color:white;
      padding:8px 16px; border-radius:12px;
      z-index:1000;
    }

    /* 🔥 COLLAPSIBLE SIDEBAR */
    .controls {
      position:absolute;
      top:60px;
      left:10px;
      background:rgba(10,30,70,0.95);
      padding:8px;
      border-radius:12px;
      z-index:1000;
      width:150px;
      color:white;
      font-size:12px;
      transition:0.3s;
    }

    .controls.collapsed {
      width:45px;
      height:45px;
      overflow:hidden;
      padding:6px;
    }

    .toggle-btn {
      background:#1a4db3;
      border:none;
      color:white;
      width:100%;
      padding:6px;
      border-radius:6px;
      margin-bottom:6px;
      cursor:pointer;
      font-size:14px;
    }

    button {
      width:100%;
      margin:3px 0;
      padding:6px;
      border:none;
      border-radius:6px;
      background:#1c3f80;
      color:white;
      font-size:12px;
      cursor:pointer;
    }

    .slider {
      width:100%;
    }

    .timestamp {
      position:absolute;
      bottom:10px;
      left:50%;
      transform:translateX(-50%);
      background:rgba(0,0,0,0.6);
      color:white;
      padding:4px 10px;
      border-radius:8px;
      font-size:12px;
      z-index:1000;
    }

    .panel {
      position:fixed;
      top:0;
      right:-100%;
      width:100%;
      max-width:360px;
      height:100%;
      background:#0b1e3c;
      color:white;
      transition:0.3s;
      z-index:2000;
      padding:12px;
      overflow-y:auto;
    }

    .panel.open { right:0; }

    .close-btn {
      float:right;
      background:red;
      color:white;
      border:none;
      padding:6px;
    }

    .fronts-blend {
      mix-blend-mode: multiply;
      opacity: 0.85;
    }
  </style>
</head>
<body>

<div class="topbar">⚡ CW Storm Center</div>

<div class="controls collapsed" id="controls">
  <button class="toggle-btn" onclick="toggleControls()">☰</button>

  <button onclick="setLayer('cat')">SPC Cat</button>
  <button onclick="setLayer('torn')">Tornado</button>
  <button onclick="setLayer('wind')">Wind</button>
  <button onclick="setLayer('hail')">Hail</button>

  <button onclick="setDay(1)">Day 1</button>
  <button onclick="setDay(2)">Day 2</button>
  <button onclick="setDay(3)">Day 3</button>

  <hr>

  <button onclick="toggleRadar()">Radar</button>

  <label>Opacity</label>
  <input type="range" min="0.1" max="1" step="0.05" value="0.45"
    class="slider" oninput="setRadarOpacity(this.value)">

  <button onclick="toggleWarnings()">Alerts</button>
  <button onclick="toggleFronts()">Fronts</button>
</div>

<div id="timestamp" class="timestamp">Radar Time</div>

<div id="panel" class="panel">
  <button class="close-btn" onclick="closePanel()">X</button>
  <pre id="text">Click SPC or alerts...</pre>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([37.8,-96],4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= COLLAPSE =================
function toggleControls(){
  document.getElementById("controls").classList.toggle("collapsed");
}

// ================= RADAR =================
let radarLayers = [];
let radarFrames = [];
let radarIndex = 0;
let radarOpacity = 0.45;
let radarOn = false;
let radarInterval;

function loadRadar(){
  fetch("https://api.rainviewer.com/public/weather-maps.json")
    .then(r => r.json())
    .then(data => {

      radarFrames = data.radar.past.slice(-8);

      radarLayers = radarFrames.map(frame =>
        L.tileLayer(
          `https://tilecache.rainviewer.com${frame.path}/256/{z}/{x}/{y}/2/1_1.png`,
          { opacity: 0, zIndex: 1000 }
        )
      );

      radarLayers.forEach(l => l.addTo(map));

      radarLayers[0].setOpacity(radarOpacity);
      updateTimestamp();

      radarInterval = setInterval(() => {
        radarLayers[radarIndex].setOpacity(0);
        radarIndex = (radarIndex + 1) % radarLayers.length;
        radarLayers[radarIndex].setOpacity(radarOpacity);
        updateTimestamp();
      }, 500);
    });
}

function updateTimestamp(){
  let ts = radarFrames[radarIndex].time;
  let date = new Date(ts * 1000);
  document.getElementById("timestamp").textContent =
    "Radar: " + date.toLocaleTimeString();
}

function setRadarOpacity(val){
  radarOpacity = val;
  radarLayers.forEach(l => l.setOpacity(0));
  if(radarLayers[radarIndex]){
    radarLayers[radarIndex].setOpacity(radarOpacity);
  }
}

function toggleRadar(){
  if(radarOn){
    radarLayers.forEach(l => map.removeLayer(l));
    clearInterval(radarInterval);
  } else {
    loadRadar();
  }
  radarOn = !radarOn;
}

// ================= WARNINGS =================
let warningsLayer, warningsOn=false;

function toggleWarnings(){
  if(warningsOn){
    map.removeLayer(warningsLayer);
    warningsOn=false;
    return;
  }

  fetch("https://api.weather.gov/alerts/active")
    .then(r=>r.json())
    .then(data=>{
      warningsLayer = L.geoJson(data,{
        style:{color:"red",weight:2,fillOpacity:0.15},
        onEachFeature:(f,l)=>{
          l.on("click", ()=>{
            openPanel();
            document.getElementById("text").textContent =
              f.properties.event + "\n\n" + f.properties.description;
          });
        }
      }).addTo(map);
      warningsOn=true;
    });
}

// ================= FRONTS =================
let frontsLayer, frontsOn=false;
let frontsInterval;

function toggleFronts(){
  if(frontsOn){
    map.removeLayer(frontsLayer);
    clearInterval(frontsInterval);
  } else {

    let bounds = [[22,-125],[52,-65]];

    function loadFronts(){
      if(frontsLayer) map.removeLayer(frontsLayer);

      frontsLayer = L.imageOverlay(
        "https://www.wpc.ncep.noaa.gov/sfc/usfntsfcwbg.gif?" + Date.now(),
        bounds,
        { className:"fronts-blend", zIndex:500 }
      ).addTo(map);
    }

    loadFronts();
    frontsInterval = setInterval(loadFronts, 300000);
  }
  frontsOn = !frontsOn;
}

// ================= SPC =================
let spcLayer;
let currentLayer="cat";
let currentDay=1;

function getCatColor(l){
  return {"TSTM":"#A8E6A3","MRGL":"#5CC85C","SLGT":"#FFD84D",
  "ENH":"#FF9A3D","MDT":"#FF4C4C","HIGH":"#FF00FF"}[l]||"transparent";
}

function loadSPC(){
  if(spcLayer) map.removeLayer(spcLayer);

  fetch(`https://www.spc.noaa.gov/products/outlook/day${currentDay}otlk_cat.lyr.geojson`)
    .then(r=>r.json())
    .then(data=>{
      spcLayer = L.geoJson(data,{
        style:f=>({
          fillColor:getCatColor(f.properties.LABEL),
          fillOpacity:0.5,
          color:"#333"
        }),
        onEachFeature:(f,l)=>{
          l.on("click",()=>{
            openPanel();
            loadText();
          });
        }
      }).addTo(map);
    });
}

function loadText(){
  fetch(`https://www.spc.noaa.gov/products/outlook/day${currentDay}otlk.txt`)
    .then(r=>r.text())
    .then(t=>{
      document.getElementById("text").textContent=t;
    });
}

function setLayer(l){ currentLayer=l; loadSPC(); }
function setDay(d){ currentDay=d; loadSPC(); }

// ================= UI =================
function openPanel(){
  document.getElementById("panel").classList.add("open");
}
function closePanel(){
  document.getElementById("panel").classList.remove("open");
}

// INIT
loadSPC();

</script>

</body>
</html>
