<!DOCTYPE html>
<html>
<head>
  <title>SPC Outlook - Clayton's Weather</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; font-family: -apple-system, sans-serif; }
    #map { height: 100vh; }

    .topbar {
      position: absolute;
      top: 15px;
      left: 50%;
      transform: translateX(-50%);
      background: #0066cc;
      color: white;
      padding: 10px 20px;
      border-radius: 15px;
      z-index: 1000;
    }

    .controls {
      position: absolute;
      top: 70px;
      left: 15px;
      background: white;
      padding: 12px;
      border-radius: 12px;
      z-index: 1000;
      width: 180px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.2);
    }

    button {
      width: 100%;
      margin: 4px 0;
      padding: 8px;
      border: none;
      border-radius: 8px;
      background: #ddd;
      cursor: pointer;
    }

    button.active {
      background: #0066cc;
      color: white;
    }

    /* SIDE PANEL */
    .panel {
      position: fixed;
      top: 0;
      right: -400px;
      width: 400px;
      height: 100%;
      background: white;
      transition: 0.3s;
      z-index: 2000;
      overflow-y: auto;
      padding: 15px;
      box-shadow: -5px 0 20px rgba(0,0,0,0.3);
    }

    .panel.open { right: 0; }

    .close-btn {
      float: right;
      background: red;
      color: white;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

  </style>
</head>
<body>

<div class="topbar">⚡ SPC Outlook | Clayton’s Weather</div>

<div class="controls">
  <b>Layer</b>
  <button id="btn-cat" onclick="setLayer('cat')">Category</button>
  <button id="btn-torn" onclick="setLayer('torn')">Tornado</button>
  <button id="btn-wind" onclick="setLayer('wind')">Wind</button>
  <button id="btn-hail" onclick="setLayer('hail')">Hail</button>

  <hr>

  <b>Day</b>
  <button id="day1" onclick="setDay(1)">Day 1</button>
  <button id="day2" onclick="setDay(2)">Day 2</button>
  <button id="day3" onclick="setDay(3)">Day 3</button>
</div>

<div id="panel" class="panel">
  <button class="close-btn" onclick="closePanel()">Close</button>
  <h3>SPC Discussion</h3>
  <pre id="panel-content">Click a region to load discussion...</pre>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
var map = L.map('map').setView([37.8, -96], 4);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let geojsonLayer;
let currentDay = 1;
let currentLayer = "cat";

// COLORS
function getCatColor(label) {
  return {
    "TSTM":"#A8E6A3","MRGL":"#5CC85C","SLGT":"#FFD84D",
    "ENH":"#FF9A3D","MDT":"#FF4C4C","HIGH":"#FF00FF"
  }[label] || "transparent";
}

function getProbColor(p) {
  if (p>=60) return "#FF00FF";
  if (p>=45) return "#E60000";
  if (p>=30) return "#FF6600";
  if (p>=15) return "#FFCC00";
  if (p>=10) return "#FFFF66";
  if (p>=5) return "#66CC66";
  if (p>=2) return "#B2FFB2";
  return "transparent";
}

// BUTTON STATE
function updateButtons() {
  document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
  document.getElementById("btn-"+currentLayer).classList.add("active");
  document.getElementById("day"+currentDay).classList.add("active");
}

// LOAD SPC
function loadSPC() {

  updateButtons();

  if (geojsonLayer) map.removeLayer(geojsonLayer);

  let base = `https://www.spc.noaa.gov/products/outlook/day${currentDay}`;

  let url = {
    cat:`${base}otlk_cat.lyr.geojson`,
    torn:`${base}otlk_torn.lyr.geojson`,
    wind:`${base}otlk_wind.lyr.geojson`,
    hail:`${base}otlk_hail.lyr.geojson`
  }[currentLayer];

  fetch(url)
    .then(r => r.json())
    .then(data => {

      geojsonLayer = L.geoJson(data, {

        style: f => ({
          fillColor: currentLayer==="cat"
            ? getCatColor(f.properties.LABEL)
            : getProbColor(f.properties.DN),
          weight: 1,
          color: "#333",
          fillOpacity: 0.6
        }),

        onEachFeature: (f, layer) => {
          layer.on("click", () => {
            openPanel();
            loadDiscussion();
          });
        }

      }).addTo(map);

    })
    .catch(() => {
      alert("SPC DATA FAILED TO LOAD (likely GitHub Pages blocking it)");
    });
}

// PANEL
function openPanel() {
  document.getElementById("panel").classList.add("open");
}

function closePanel() {
  document.getElementById("panel").classList.remove("open");
}

// TEXT (WITH FALLBACK)
function loadDiscussion() {
  let url = `https://www.spc.noaa.gov/products/outlook/day${currentDay}otlk.txt`;

  fetch(url)
    .then(r => r.text())
    .then(t => {
      document.getElementById("panel-content").textContent = t;
    })
    .catch(() => {
      document.getElementById("panel-content").textContent =
        "⚠️ Unable to load SPC text.\n\nThis is usually caused by browser blocking.\n\nBut your map is still working.";
    });
}

// CONTROLS
function setLayer(l){ currentLayer=l; loadSPC(); }
function setDay(d){ currentDay=d; loadSPC(); }

// INIT
loadSPC();
</script>

</body>
</html>
