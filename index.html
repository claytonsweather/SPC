<!DOCTYPE html>
<html>
<head>
  <title>SPC Outlook Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; }
    #map { height: 100vh; width: 100%; }

    .legend {
      background: white;
      padding: 10px;
      font-family: Arial;
      line-height: 18px;
      border-radius: 8px;
    }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
// Initialize map
var map = L.map('map').setView([37.8, -96], 4);

// Base layer
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 8
}).addTo(map);

// Risk colors
function getColor(risk) {
  return risk === "TSTM" ? "#55BB55" :
         risk === "MRGL" ? "#00FF00" :
         risk === "SLGT" ? "#FFFF00" :
         risk === "ENH"  ? "#FFA500" :
         risk === "MDT"  ? "#FF0000" :
         risk === "HIGH" ? "#FF00FF" :
                           "#CCCCCC";
}

// Style
function style(feature) {
  return {
    fillColor: getColor(feature.properties.risk),
    weight: 2,
    opacity: 1,
    color: 'black',
    fillOpacity: 0.6
  };
}

// Highlight on hover
function highlightFeature(e) {
  var layer = e.target;
  layer.setStyle({
    weight: 3,
    color: '#000',
    fillOpacity: 0.8
  });
}

// Reset highlight
function resetHighlight(e) {
  geojson.resetStyle(e.target);
}

// Click popup
function onEachFeature(feature, layer) {
  layer.on({
    mouseover: highlightFeature,
    mouseout: resetHighlight,
    click: function(e) {
      layer.bindPopup(
        "<b>SPC Risk:</b> " + feature.properties.risk +
        "<br><b>Probability:</b> " + (feature.properties.prob || "N/A")
      ).openPopup();
    }
  });
}

// Load SPC data
fetch('spc-data.json')
  .then(res => res.json())
  .then(data => {
    geojson = L.geoJson(data, {
      style: style,
      onEachFeature: onEachFeature
    }).addTo(map);
  });

// Legend
var legend = L.control({position: 'bottomright'});

legend.onAdd = function () {
  var div = L.DomUtil.create('div', 'legend');
  div.innerHTML += "<b>SPC Outlook</b><br>";
  div.innerHTML += "🟢 TSTM<br>";
  div.innerHTML += "🟩 Marginal<br>";
  div.innerHTML += "🟨 Slight<br>";
  div.innerHTML += "🟧 Enhanced<br>";
  div.innerHTML += "🟥 Moderate<br>";
  div.innerHTML += "🟪 High<br>";
  return div;
};

legend.addTo(map);
</script>

</body>
</html>
